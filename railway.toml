[build]
builder = "NIXPACKS"

[build.nixpacks]
pythonVersion = "3.12"

[deploy]
startCommand = "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --threads 2 --timeout 120"
healthcheckPath = "/health/"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
